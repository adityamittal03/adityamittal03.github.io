baseURL = 'https://adityamittal03.github.io'
languageCode = 'en-us'
title = 'Aditya Mittal - About Me'
theme = 'maverick'
ignoreFiles = ['(^|/)\\.DS_Store$']

[build]
  publishDir = 'public'

# Google Analytics Configuration
# googleAnalytics = 'G-HBBB14MJL3'  

[permalinks]
  pages = "/:slug"

[params]
  logo = '/icon_test.png'
  description = "I'm a Masters student at UC Irvine, and my research interests are in fairness in machine learning."
  author = 'Aditya Mittal'
  items = 10

[menu]
  [[menu.main]]
    identifier = "blog"
    name = "Blog"
    url = "/blog/"
    weight = 4

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    hl_Lines = ''
    hl_inline = false
    lineAnchors = ''
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = true
    noClasses = true
    noHl = false
    style = 'monokailight'
    tabWidth = 4
